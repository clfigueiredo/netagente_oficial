services:

  # ── Traefik: proxy reverso + SSL automático
  traefik:
    image: traefik:v3.6.1
    container_name: traefik
    restart: unless-stopped
    group_add:
      - "994"
    command:
      - --api.dashboard=true
      - --api.insecure=false
      - --log.level=INFO
      - --providers.docker=true
      - --providers.docker.exposedbydefault=false
      - --providers.file.directory=/etc/traefik/config
      - --providers.file.watch=true
      - --entrypoints.web.address=:80
      - --entrypoints.websecure.address=:443
      - --certificatesresolvers.letsencrypt.acme.email=admin@forumtelecom.com.br
      - --certificatesresolvers.letsencrypt.acme.storage=/certs/acme.json
      - --certificatesresolvers.letsencrypt.acme.httpchallenge=true
      - --certificatesresolvers.letsencrypt.acme.httpchallenge.entrypoint=web
    ports:
      - "80:80"
      - "443:443"
      - "8080:8080"
    extra_hosts:
      - "host-gateway:host-gateway"
    volumes:
      - /run/docker.sock:/var/run/docker.sock
      - ./traefik/certs:/certs
      - ./traefik/config:/etc/traefik/config:ro
    networks:
      - netagent-net

  # ── Nginx: serve frontend (dist estático)
  frontend:
    image: nginx:alpine
    container_name: netagent-frontend
    restart: unless-stopped
    extra_hosts:
      - "host-gateway:host-gateway"
    volumes:
      - ./frontend/dist:/usr/share/nginx/html:ro
      - ./traefik/nginx-frontend.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - netagent-net
    labels:
      - "traefik.enable=true"
      # HTTPS
      - "traefik.http.routers.frontend-https.rule=Host(`agente.forumtelecom.com.br`)"
      - "traefik.http.routers.frontend-https.entrypoints=websecure"
      - "traefik.http.routers.frontend-https.tls.certresolver=letsencrypt"
      # HTTP → HTTPS redirect
      - "traefik.http.routers.frontend-http.rule=Host(`agente.forumtelecom.com.br`)"
      - "traefik.http.routers.frontend-http.entrypoints=web"
      - "traefik.http.routers.frontend-http.middlewares=https-redirect"
      - "traefik.http.middlewares.https-redirect.redirectscheme.scheme=https"
      - "traefik.http.services.frontend.loadbalancer.server.port=80"

  # ── PostgreSQL 16 + pgvector
  postgres:
    image: pgvector/pgvector:pg16
    container_name: netagent-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: netagent
      POSTGRES_USER: netagent
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - ./data/postgres:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:5432:5432"
    networks:
      - netagent-net

  # ── Redis 7
  redis:
    image: redis:7-alpine
    container_name: netagent-redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD}
    volumes:
      - ./data/redis:/data
    ports:
      - "127.0.0.1:6379:6379"
    networks:
      - netagent-net

  # ── Evolution API v2.3.4
  evolution:
    image: evoapicloud/evolution-api:v2.3.4
    container_name: evolution-api
    restart: unless-stopped
    depends_on:
      - postgres
    environment:
      # Server
      SERVER_TYPE: "http"
      SERVER_PORT: "8080"
      SERVER_URL: "https://agenteevo.forumtelecom.com.br"
      # Auth
      AUTHENTICATION_TYPE: "apikey"
      AUTHENTICATION_API_KEY: ${EVOLUTION_GLOBAL_KEY}
      AUTHENTICATION_EXPOSE_IN_FETCH_INSTANCES: "true"
      # Logs
      LOG_LEVEL: "ERROR"
      LOG_COLOR: "false"
      # Instance
      DEL_INSTANCE: "false"
      # Database (PostgreSQL — v2 exige banco real)
      DATABASE_PROVIDER: "postgresql"
      DATABASE_CONNECTION_URI: "postgresql://netagent:${POSTGRES_PASSWORD}@netagent-postgres:5432/evolution"
      DATABASE_CONNECTION_CLIENT_NAME: "evolution_api"
      DATABASE_SAVE_DATA_INSTANCE: "true"
      DATABASE_SAVE_DATA_NEW_MESSAGE: "true"
      DATABASE_SAVE_MESSAGE_UPDATE: "true"
      DATABASE_SAVE_DATA_CONTACTS: "true"
      DATABASE_SAVE_DATA_CHATS: "true"
      DATABASE_SAVE_DATA_LABELS: "true"
      DATABASE_SAVE_DATA_HISTORIC: "true"
      # Redis (desabilitado)
      CACHE_REDIS_ENABLED: "false"
      # WhatsApp
      QRCODE_LIMIT: "30"
      QRCODE_COLOR: "#198754"
    volumes:
      - ./data/evolution:/evolution/instances
    networks:
      - netagent-net
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.evolution-https.rule=Host(`agenteevo.forumtelecom.com.br`)"
      - "traefik.http.routers.evolution-https.entrypoints=websecure"
      - "traefik.http.routers.evolution-https.tls.certresolver=letsencrypt"
      - "traefik.http.routers.evolution-http.rule=Host(`agenteevo.forumtelecom.com.br`)"
      - "traefik.http.routers.evolution-http.entrypoints=web"
      - "traefik.http.routers.evolution-http.middlewares=https-redirect"
      - "traefik.http.services.evolution.loadbalancer.server.port=8080"

  # ── MCP MikroTik Driver
  mcp-mikrotik:
    build: ./mcp-mikrotik
    container_name: mcp-mikrotik
    restart: unless-stopped
    environment:
      PORT: "8001"
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8001/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
    ports:
      - "8001:8001"
    networks:
      - netagent-net

  # ── MCP Linux Driver
  mcp-linux:
    build: ./mcp-linux
    container_name: mcp-linux
    restart: unless-stopped
    environment:
      PORT: "8002"
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8002/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
    ports:
      - "8002:8002"
    networks:
      - netagent-net

  # ── WireGuard VPN Server (Concentrator) - Per-tenant interfaces
  wireguard:
    build: ./docker/wireguard
    container_name: netagent-wireguard
    cap_add:
      - NET_ADMIN
      - SYS_MODULE
    environment:
      - TZ=America/Sao_Paulo
    volumes:
      - ./data/wireguard:/etc/wireguard
      - /lib/modules:/lib/modules:ro
    network_mode: "host"
    restart: unless-stopped


networks:
  netagent-net:
    name: netagent-net
