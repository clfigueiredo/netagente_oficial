http:
  # ── Serviços rodando no HOST (fora do Docker) ───────────────────────────

  routers:
    # API Node.js → api.forumtelecom.com.br
    api-https:
      rule: "Host(`api.forumtelecom.com.br`)"
      entrypoints:
        - websecure
      tls:
        certResolver: letsencrypt
      service: api-host
      middlewares:
        - cors-api

    api-http:
      rule: "Host(`api.forumtelecom.com.br`)"
      entrypoints:
        - web
      middlewares:
        - https-redirect
      service: api-host

    # Agent Python → agent.forumtelecom.com.br
    agent-https:
      rule: "Host(`agent.forumtelecom.com.br`)"
      entrypoints:
        - websecure
      tls:
        certResolver: letsencrypt
      service: agent-host

    agent-http:
      rule: "Host(`agent.forumtelecom.com.br`)"
      entrypoints:
        - web
      middlewares:
        - https-redirect
      service: agent-host

  services:
    # API Node.js na porta 4000 do host
    api-host:
      loadBalancer:
        servers:
          - url: "http://host-gateway:4000"

    # Agent Python na porta 8000 do host
    agent-host:
      loadBalancer:
        servers:
          - url: "http://host-gateway:8000"

  middlewares:
    https-redirect:
      redirectScheme:
        scheme: https
        permanent: true

    # CORS para a API (permite o frontend chamar)
    cors-api:
      headers:
        accessControlAllowMethods:
          - GET
          - POST
          - PUT
          - DELETE
          - OPTIONS
        accessControlAllowHeaders:
          - "*"
        accessControlAllowOriginList:
          - "https://agente.forumtelecom.com.br"
        accessControlMaxAge: 3600
